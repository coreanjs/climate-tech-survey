<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기후변화대응 기술개발활동조사 — 22개 기술분야 동향</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700;900&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#0c1729;
  --navy-900:#11203a;
  --navy-800:#16294a;
  --navy-700:#1d3460;
  --paper:#f2ede1;
  --paper-soft:#e9e2d2;
  --card:#faf8f2;
  --ink:#1c2230;
  --ink-soft:#5b6271;
  --ink-faint:#8a8f9c;
  --gold:#b08a3e;
  --gold-soft:#dcc384;
  --gold-deep:#8a6a28;
  --stamp:#8c3a3a;
  --line:#d9d1ba;
  --line-soft:#e6e0cf;
  --radius:2px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'IBM Plex Sans KR', sans-serif;
  font-size:14.5px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--gold-soft);color:var(--navy-950);}
a{color:inherit;}
.mono{font-family:'IBM Plex Mono','IBM Plex Sans KR', monospace;}
.serif{font-family:'Noto Serif KR', serif;}

/* ---------- Top bar ---------- */
.topbar{
  background:var(--navy-950);
  color:#efe9d8;
  border-bottom:3px solid var(--gold);
}
.topbar-inner{
  max-width:1440px;margin:0 auto;
  padding:22px 28px 18px;
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:24px;flex-wrap:wrap;
}
.brand-eyebrow{
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold-soft);margin-bottom:8px;
}
.brand-title{
  font-family:'Noto Serif KR',serif;
  font-weight:700;
  font-size:26px;
  letter-spacing:-.01em;
  color:#f6f1e3;
}
.brand-sub{
  margin-top:6px;font-size:12.5px;color:#a9aebb;
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;letter-spacing:.02em;
}
.search-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--navy-900);
  border:1px solid #2a3a5c;
  padding:9px 12px;min-width:280px;
}
.search-box input{
  background:transparent;border:none;outline:none;
  color:#f1ece0;font-family:'IBM Plex Sans KR',sans-serif;font-size:13.5px;
  width:100%;
}
.search-box input::placeholder{color:#717892;}
.search-box svg{flex:none;opacity:.7;}
.search-hint{font-size:10.5px;color:#6a7388;font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;}

/* ---------- Stats ledger strip ---------- */
.ledger{
  background:var(--navy-800);
  border-bottom:1px solid #233357;
}
.ledger-inner{
  max-width:1440px;margin:0 auto;
  display:flex;flex-wrap:wrap;
  padding:0 28px;
}
.ledger-item{
  padding:10px 22px 10px 0;
  margin-right:22px;
  border-right:1px solid #233357;
  display:flex;align-items:baseline;gap:8px;
  white-space:nowrap;
}
.ledger-item:last-child{border-right:none;}
.ledger-num{font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-weight:600;font-size:15px;color:var(--gold-soft);}
.ledger-label{font-size:11px;color:#9aa1b2;letter-spacing:.03em;}

/* ---------- Layout ---------- */
.layout{
  max-width:1440px;margin:0 auto;
  display:grid;
  grid-template-columns:288px 1fr;
  min-height:calc(100vh - 130px);
}
/* ---------- Sidebar / index tabs ---------- */
.sidebar{
  border-right:1px solid var(--line);
  background:var(--paper-soft);
  padding:20px 0 60px;
}
.group-block{margin-bottom:6px;}

/* ---------- Overview nav ---------- */
.overview-nav{
  margin:14px 16px 4px;
  padding:11px 14px;
  background:var(--navy-950);
  color:#f1ece0;
  cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  border-left:3px solid transparent;
}
.overview-nav .ov-icon{
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10.5px;color:var(--gold-soft);
  letter-spacing:.1em;
}
.overview-nav .ov-name{font-family:'Noto Serif KR',serif;font-weight:700;font-size:14px;}
.overview-nav.active{border-left:3px solid var(--gold);background:var(--navy-900);}
.overview-nav:hover{background:var(--navy-900);}

/* ---------- Overview content ---------- */
.ov-section{margin-bottom:36px;}
.ov-section-head{
  display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:2px solid var(--navy-950);padding-bottom:10px;margin-bottom:14px;
}
.ov-section-head h2{
  font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;margin:0;color:var(--navy-950);
}
.ov-section-head .ov-note{font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10.5px;color:var(--ink-faint);}

.ov-hero{
  display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px;
  border-bottom:2px solid var(--navy-950);padding-bottom:18px;margin-bottom:28px;
}
.ov-hero .eyebrow{
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:11px;letter-spacing:.12em;
  color:var(--gold-deep);text-transform:uppercase;margin-bottom:6px;
}
.ov-hero h1{font-family:'Noto Serif KR',serif;font-size:30px;font-weight:700;margin:0;color:var(--navy-950);}
.ov-hero p{margin:6px 0 0;color:var(--ink-soft);font-size:13px;max-width:520px;}

.kpi-row{display:flex;gap:14px;flex-wrap:wrap;}
.kpi-card{
  background:var(--card);border:1px solid var(--line);padding:14px 18px;min-width:140px;
}
.kpi-card .n{font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:26px;font-weight:600;color:var(--navy-950);}
.kpi-card .l{font-size:11px;color:var(--ink-faint);margin-top:2px;}

/* heatmap table */
.heat-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.heat-table th{
  text-align:left;font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-weight:500;font-size:10.5px;
  color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em;
  padding:6px 8px;border-bottom:1px solid var(--line);
}
.heat-table th.num{text-align:center;}
.heat-table td{padding:0;border-bottom:1px solid var(--line-soft);vertical-align:middle;}
.heat-table tr.cat-divider td{border-bottom:none;padding-top:14px;}
.heat-cat-label{
  font-family:'Noto Serif KR',serif;font-weight:700;font-size:13px;color:var(--navy-950);
  padding:4px 8px 6px;display:block;
}
.heat-group-label{
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10px;color:var(--ink-faint);
  padding:8px 8px 2px;display:block;
}
.heat-field-cell{
  padding:7px 8px;display:flex;align-items:center;gap:8px;cursor:pointer;
}
.heat-field-cell:hover .heat-field-name{color:var(--gold-deep);}
.heat-field-num{font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10px;color:var(--ink-faint);width:18px;flex:none;}
.heat-field-name{font-size:13px;color:var(--ink);}
.heat-cell{
  text-align:center;padding:7px 4px;cursor:pointer;
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-weight:600;font-size:12.5px;
  transition:outline .1s;
}
.heat-cell:hover{outline:1.5px solid var(--navy-950);outline-offset:-1.5px;}
.heat-cell.zero{color:var(--ink-faint);font-weight:400;}
.heat-total-cell{
  text-align:center;font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-weight:700;font-size:13px;
  color:var(--navy-950);background:var(--paper-soft);
}
.heat-legend{display:flex;align-items:center;gap:6px;margin-top:10px;font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10px;color:var(--ink-faint);}
.heat-legend .sw{width:16px;height:10px;display:inline-block;}

/* country coverage mini bars */
.cov-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line-soft);}
.cov-name{width:90px;flex:none;font-size:12px;color:var(--ink-soft);}
.cov-bar-track{flex:1;height:8px;background:var(--paper-soft);position:relative;display:block;overflow:hidden;}
.cov-bar-fill{height:100%;background:var(--gold);display:block;min-width:2px;}
.cov-n{width:28px;text-align:right;font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:11.5px;color:var(--navy-800);flex:none;}

.ov-back{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:11px;color:var(--navy-700);
  cursor:pointer;margin-bottom:14px;
}
.ov-back:hover{color:var(--gold-deep);}

.cat-block{border-bottom:1px solid var(--line);padding-bottom:4px;margin-bottom:4px;}
.cat-block:last-child{border-bottom:none;}
.cat-title{
  display:flex;align-items:baseline;justify-content:space-between;gap:8px;
  font-family:'Noto Serif KR',serif;font-weight:700;font-size:14.5px;
  color:var(--navy-950);
  padding:16px 20px 8px;
  border-bottom:2px solid var(--gold);
  margin:0 12px 4px;
}
.cat-count{
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-weight:400;font-size:10px;
  color:var(--ink-faint);white-space:nowrap;
}
.group-title{
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;
  font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-faint);
  padding:14px 20px 8px;
}
.field-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 20px 8px 16px;
  cursor:pointer;
  border-left:3px solid transparent;
  position:relative;
}
.field-row:hover{background:#efe7d2;}
.field-row.active{
  background:var(--card);
  border-left:3px solid var(--gold);
}
.field-row.active .field-name{color:var(--navy-950);font-weight:600;}
.field-num{
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:11px;color:var(--ink-faint);
  width:20px;flex:none;
}
.field-row.active .field-num{color:var(--gold-deep);}
.field-name{font-size:13.5px;color:var(--ink);flex:1;}
.field-count{font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10.5px;color:var(--ink-faint);}

/* mobile field select */
.mobile-field-select{display:none;}

/* ---------- Main ---------- */
.main{padding:28px 32px 80px;min-width:0;}
.field-header{
  display:flex;justify-content:space-between;align-items:flex-end;
  flex-wrap:wrap;gap:14px;
  border-bottom:2px solid var(--navy-950);
  padding-bottom:16px;margin-bottom:18px;
}
.field-header-left .eyebrow{
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:11px;letter-spacing:.12em;
  color:var(--gold-deep);text-transform:uppercase;margin-bottom:6px;
}
.field-header-left h1{
  font-family:'Noto Serif KR',serif;font-size:30px;font-weight:700;
  margin:0;color:var(--navy-950);letter-spacing:-.01em;
}
.field-stats{display:flex;gap:18px;}
.field-stat{text-align:right;}
.field-stat .n{font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:20px;font-weight:600;color:var(--navy-800);}
.field-stat .l{font-size:10.5px;color:var(--ink-faint);}

/* tabs */
.tabbar{display:flex;gap:2px;margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{
  font-family:'IBM Plex Sans KR',sans-serif;font-size:13px;font-weight:500;
  padding:9px 16px;background:var(--paper-soft);color:var(--ink-soft);
  border:1px solid var(--line);border-bottom:none;
  cursor:pointer;position:relative;top:1px;
}
.tab-btn.active{
  background:var(--card);color:var(--navy-950);font-weight:600;
  border-bottom:1px solid var(--card);
}
.tab-panel-frame{border-top:1px solid var(--line);padding-top:18px;}

/* filter chips */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;align-items:center;}
.filters .ftag{font-size:10.5px;color:var(--ink-faint);font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;margin-right:4px;}
.chip{
  font-size:12px;padding:5px 11px;border:1px solid var(--line);
  background:var(--card);color:var(--ink-soft);cursor:pointer;
  display:flex;align-items:center;gap:6px;
}
.chip .dot{width:7px;height:7px;border-radius:50%;}
.chip.active{border-color:var(--navy-800);color:var(--navy-950);background:#fff;font-weight:600;}

/* cards grid */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px;}
.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:16px 18px 14px;
  position:relative;
  display:flex;flex-direction:column;gap:8px;
}
.card::before{
  content:attr(data-idx);
  position:absolute;top:0;right:0;
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10px;color:var(--line);
  padding:4px 7px;
}
.card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.badge-country{
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10.5px;font-weight:600;
  padding:2px 7px;color:#fff;letter-spacing:.02em;
}
.badge-scope{
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10px;
  padding:2px 7px;border:1px solid var(--line);color:var(--ink-soft);
}
.badge-tag{font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10.5px;color:var(--gold-deep);}
.card-title{
  font-family:'Noto Serif KR',serif;font-weight:700;font-size:15.5px;
  color:var(--navy-950);line-height:1.4;
}
.card-org{font-size:11.5px;color:var(--ink-faint);font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;}
.card-content{font-size:13px;color:var(--ink);line-height:1.65;}
.card-goals{margin:2px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:4px;}
.card-goals li{
  font-size:12.5px;color:var(--ink-soft);padding-left:13px;position:relative;line-height:1.55;
}
.card-goals li::before{content:"–";position:absolute;left:0;color:var(--gold);}
.card-foot{
  margin-top:auto;padding-top:8px;border-top:1px dashed var(--line-soft);
  display:flex;justify-content:space-between;align-items:center;
}
.card-link{
  font-size:11px;color:var(--navy-700);text-decoration:none;
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;display:flex;align-items:center;gap:4px;
}
.card-link:hover{color:var(--gold-deep);}

.kv-block{margin-top:2px;}
.kv-label{font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:10px;color:var(--ink-faint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px;}

.market-numbers{display:flex;flex-direction:column;gap:2px;margin:2px 0;}
.market-numbers .row{display:flex;justify-content:space-between;font-size:12.5px;}
.market-numbers .row .v{font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-weight:600;color:var(--navy-800);}
.cagr-badge{
  display:inline-block;font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:12px;font-weight:600;
  color:var(--stamp);border:1px solid var(--stamp);padding:2px 8px;align-self:flex-start;
}

.empty-state{
  padding:50px 10px;text-align:center;color:var(--ink-faint);
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:13px;border:1px dashed var(--line);
}

footer{
  border-top:1px solid var(--line);background:var(--paper-soft);
  padding:18px 32px;text-align:center;color:var(--ink-faint);
  font-family:'IBM Plex Mono','IBM Plex Sans KR',monospace;font-size:11px;
}

@media (max-width:880px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .mobile-field-select{
    display:block;margin:16px 20px 0;padding:10px 12px;
    border:1px solid var(--line);background:var(--card);
    font-family:'IBM Plex Sans KR',sans-serif;font-size:13.5px;color:var(--ink);
  }
  .main{padding:18px 20px 60px;}
  .search-box{min-width:0;width:100%;}
  .search-wrap{align-items:stretch;width:100%;}
  .topbar-inner{flex-direction:column;align-items:flex-start;}
  .ov-section[style*="grid-template-columns"]{display:flex !important;flex-direction:column;gap:28px !important;}
  .heat-table{font-size:11px;}
  .heat-field-name{font-size:11.5px;}
  .heat-cell, .heat-total-cell{font-size:11px;padding:6px 3px;}
  .ov-hero{flex-direction:column;align-items:flex-start;}
  .kpi-row{width:100%;}
  .kpi-card{flex:1;min-width:0;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div>
      <div class="brand-eyebrow">국가기후기술정책센터 · 내부 참고자료</div>
      <div class="brand-title">기후변화대응 기술개발활동조사</div>
      <div class="brand-sub">GLOBAL R&amp;D · INDUSTRY · MARKET INTELLIGENCE — 22 TECH FIELDS / 7 COUNTRIES &amp; REGIONS</div>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="globalSearch" type="text" placeholder="프로젝트, 기업, 국가, 키워드 검색…">
      </div>
      <div class="search-hint">기준일 2026.06.02</div>
    </div>
  </div>
</div>

<div class="ledger">
  <div class="ledger-inner" id="ledgerStrip"></div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <select class="mobile-field-select" id="mobileSelect"></select>
  <main class="main">
    <div id="overviewPanel"></div>
    <div id="fieldPanel">
      <div class="field-header">
        <div class="field-header-left">
          <div class="eyebrow" id="fieldGroupLabel"></div>
          <h1 id="fieldTitle"></h1>
        </div>
        <div class="field-stats" id="fieldStats"></div>
      </div>

      <div class="tabbar" id="tabbar"></div>
      <div class="tab-panel-frame">
        <div class="filters" id="filters"></div>
        <div class="cards" id="cards"></div>
      </div>
    </div>
  </main>
</div>

T, ECMWF", "content": "코페르니쿠스 위성군을 활용한 인위적 CO2 배출량 직접 모니터링", "goals": ["ECMWF·EUMETSAT와 역할 분담 체계 완성. 도시·국가 단위 인위적 CO₂ 배출의 독립 정량화 최초 구현 예정(2027년 이후)"], "url": "https://www.esa.int/Applications/Observing_the_Earth/Copernicus/Future_of_Copernicus_Expansion_Missions_secured"}, {"field": "기후변화 모니터링", "country": "EU", "title": "CLIMAAX", "tag": "(응용/실증)", "org": "ECMWF 등", "content": "유럽 지역 단위 기후위험 평가 체계 구축 프로젝트", "goals": ["유럽 전역에서 표준화된 기후위험 평가체계 구축을 목표로, 유럽 전역의 지역 기후위험 평가 프레임워크와 도구, 재정 지원 체계를 구축하는 정책 연계형 프로그램", "(중국) 중국은 정지궤도·탄소 관측 위성군과 지구 시스템 시뮬레이션 엔진을 결합하여 전 지구적 기후 변화를 실시간 감시하고 과학적으로 진단하는 ‘디지털 어스 차이나’ 체계를 공고히 함", "Fengyun-4C와 TanSat-2 위성군을 활용하여 1분 단위의 초정밀 기상 스캔과 전 지구적 온실가스 농도를 매일 추적하는 입체적인 우주 관측 인프라를 고도화", "특히 2026년 발사 예정인 TanSat-2는 2,900km의 초광폭 관측과 500m급 고해상도 데이터를 제공함으로써, 국가 단위를 넘어 도시 및 산업 시설별 탄소 중립 이행 여부를 과학적으로 검증하는 핵심 국가 자산으로 활용", "중국판 지구 디지털 실험실인 어스랩(EarthLab)은 슈퍼컴퓨터를 통해 대기, 해양, 빙권, 생물권의 복잡한 상호작용을 수치 모델로 모의하며 관측 데이터와 시뮬레이션을 정밀하게 결합, 이를 통해 이상기후 및 자연재해에 대한 선제적 시나리오를 구축하여 기술자립화 추진"], "url": "https://www.climaax.eu/"}, {"field": "기후변화 모니터링", "country": "중국", "title": "Fengyun-4C (FY-4C)", "tag": "(실증)", "org": "SAST / (운영 : CMA)", "content": "정지궤도 위성을 통한 1분 단위 초정밀 스캔 및 재난 조기경보 체계 운영", "goals": ["FY-4B와 함께 듀얼 위성 체계를 구성하여 태풍·극한기상 조기경보와 아시아-태평양 기상 모니터링 역량을 강화하는 것을 목표로 함"], "url": "https://wmo.int/media/news-from-members/fengyun-4c-meteorological-satellite-lifted"}, {"field": "기후변화 모니터링", "country": "중국", "title": "EarthLab(Earth System Numerical Simulation Facility)", "tag": "(원천, 국제협력)", "org": "CAS IAP 등", "content": "Digital Earth China 전략의 핵심 엔진으로서 기후예측·재난대응·탄소연구를 위한 중국판 지구 디지털 실험실", "goals": ["슈퍼컴퓨터 기반 지구 시스템 시뮬레이션 플랫폼으로 아래와 같은 목표로 추진", "대기·해양·빙권·생물권 등 상호작용 연구", "시뮬레이션과 관측 데이터 융합", "국제 선도 수준 지구 시스템 연구 목표"], "url": "https://earthlab.iap.ac.cn/en/index.html"}, {"field": "기후변화 모니터링", "country": "중국", "title": "TanSat-2", "tag": "(응용/실증)", "org": "CAS(중국과학원), CMA(중국기상청)", "content": "2016년 발사된 중국 최초의 탄소 관측 위성인 TanSat의 뒤를 잇는 차세대 온실가스 감시 위성으로 2026년 발사를 목표로 개발", "goals": ["전지구적 탄소 순환 모니터링과 탄소 중립 이행 검증을 위한 핵심자산으로 평가", "초광폭(2,900km) 관측, 고해상도 데이터(500m급), 위성군집(4~8기) 운영", "(한국) 기후변화 감시자료의 안정적 생산과 진단·활용 시스템 고도화하며 AI·데이터 기반의 선제적 대응역량 및 독자적인 기후감시·예측 역량을 고도화 중", "세계 기준 176개 기후감시요소 중 국내 여건에 맞는 100여 개 핵심기후변수를 선정하고 표준 관측망을 고도화를 추진하여 국가 차원의 기후데이터 기반을 강화중", "한국형 수치모델(KIM)을 중심으로 대기·해양·해빙·생태계를 통합하는 국가기후예측시스템을 개발하여 1개월~10년 기후를 독자적으로 생산하는 체계를 단계적으로 완성중", "(`25년) 시스템 개발 본격 착수, (`26년) 시스템 원형 개발, (`27년) 향후 1년까지의 기후예측 시스템 개발, (`28~`30년) 국가기후예측시스템 개발 완료", "AI 기반 원천연구와 온실가스 공간정보지도 구축, 해양 장기전망 연구를 통해 탄소순환 추적과 복합재해 예측 역량을 고도화하며 기후위기 대응력을 강화"], "url": "https://space.oscar.wmo.int/satellites/view/tansat_2"}, {"field": "기후변화 모니터링", "country": "한국", "title": "관측기반 온실가스 공간정보 지도 구축 기술개발사업", "tag": "(응용/실증)", "org": "기후부", "content": "위성 등 관측기반 지역단위 온실가스 인벤토리 구축 및 미래 배출량 예측 기술을 개발하고, 이를 시공간적으로 통합 표출하는 온실가스 공간정보지도 구축 기술개발", "goals": ["지상, 항공, 위성 등 다양한 관측 데이터와 탄소순환 모델을 융합하여 CO2, CH4 등의 배출·흡수량(Carbon Flux)을 고해상도로 시각화하고 이동 경로를 예측하는 기술 플랫폼 개발 (플랫폼 + 인벤토리 + 변화예측)"], "url": "https://www.keiti.re.kr/site/keiti/02/10201010000002018092810.jsp"}, {"field": "기후변화 모니터링", "country": "한국", "title": "국가기후예측시스템 개발사업", "tag": "(응용/개발)", "org": "기상청", "content": "국가기후예측 시스템 핵심기술 + 접합기술 + 현업기반 기술 + 수요자 맞춤형 서비스체계 개발을 지원", "goals": ["한국형 수치예보모델(KIM) 기반으로  대기·대기화학, 해양, 해빙, 지면, 생태계 등을 포괄적으로 동시에 예측하는 지구시스템 기후모델 기술 개발", "1개월~10년 기후예측정보를 독자적으로 생산하는 체계를 마련"], "url": "https://www.pcccr.go.kr/base/board/read?boardManagementNo=43&boardNo=5351&page=1&searchCategory=&searchType=&searchWord=&menuLevel=2&menuNo=73"}, {"field": "기후변화 모니터링", "country": "한국", "title": "AI 기반 미래 기후기술개발 원천연구사업", "tag": "(원천)", "org": "과기부", "content": "AI 융합 기후변화 모델 요소 기술을 통한 전지구 기후변화 예측모델 및 한반도 복합재해 기작 규명 등 예측기술개발", "goals": ["AI 기반 설계와 멀티스케일 분석을 통한 기후변화 적응형 소재 및 물성 예측 기술 개발", "전력 공급 체계의 영향을 받지 않는 미래기후변화 긴급상황 대응을 위한 AI 설계 기반의 에너지자립형·무동력 담수 생산 시스템 원천기술 개발"], "url": "https://www.iris.go.kr/contents/retrieveBsnsAncmView.do?ancmId=018237"}, {"field": "기후변화 모니터링", "country": "한국", "title": "해양기후변화 진단 및 장기전망연구", "tag": "(원천/응용 hrough Nature-based Solutions (NATURANCE)", "tag": "(실증/국제협력)", "org": "ICLEI Europe, LSE Grantham Research Institute", "content": "자연기반솔루션(NbS)이 기후 리스크 감소에 미치는 효과를 정량적으로 진단하고, 보험 및 녹색 금융 상품과 연계하는 비즈니스 모델 실증", "goals": ["NbS의 리스크 완화 효과를 평가하는 기술적 프레임워크 구축 및 투자 유치를 위한 '기후 리스크-재무 통합 평가 도구' 개발", "현재 유럽 내 주요 시범 사업지의 리스크 감소 성과 데이터를 바탕으로 금융 상품 가이드라인 수립 중"], "url": "https://www.naturanceproject.eu/project/"}, {"field": "기후영향평가·진단", "country": "EU", "title": "Climate Risk and Vulnerability Assessment Framework and Toolbox", "tag": "(응용/실증)", "org": "Deltares (네덜란드) 외 50개 기관 컨소시엄", "content": "유럽 내 지역 및 공동체가 자체적으로 기후 리스크를 분석할 수 있는 통합 프레임워크와 툴박스 개발", "goals": ["현장 중심의 실무형 리스크 평가 프레임워크 구축", "최소 50개 지역·5개 시범을 지원하는 재정·기술 지원 메커니즘 보급하고 실증 사례를 창출"], "url": "https://www.climaax.eu/project/"}, {"field": "기후영향평가·진단", "country": "EU", "title": "A Gathering Place to Co-design and Co-create Adaptation", "tag": "(실증/국제협력)", "org": "CMCC / (이탈리아)", "content": "디지털 리스크 소통 플랫폼 구축 및 지역 공동체 중심의 적응 역량·사회적 취약성 매핑", "goals": ["시민 참여형 기후 적응 의사결정 모델 정립", "정량적 지표에 정성적인 사회적 역량을 결합한 하이브리드 진단"], "url": "https://nora.nerc.ac.uk/id/eprint/534159/"}, {"field": "기후영향평가·진단", "country": "EU", "title": "Disaster Resilience for Extreme Climate Events", "tag": "(실증/응용)", "org": "Fraunhofer / (독일)", "content": "재난 위험 관리와 기후 적응을 결합한 실시간 데이터 기반 도시 인프라 취약성 진단 플랫폼", "goals": ["파편화된 재난 데이터를 통합하여 지능형 의사결정 지원", "실시간 데이터 처리 기술을 통한 '동적 리스크 매핑' 구현", "(중국) AI 기반의 정밀 리스크 평가 체계 구축과 맞춤형 적응 기술 실증을 통한 '기후 탄력적 사회'로의 전환 가속화", "수자원, 생태계, 공중보건 등 핵심 부문별로 특화된 기후리스크 영향 체인을 분석하고, 특히 초미세먼지(PM2.5)와 산불 등 기후변화로 인한 복합 위기가 사회경제적 손실에 미치는 영향을 평가하는 R&D 집중", "AI와 거시경제 모델을 결합하여 기후 위협이 사회경제적으로 미치는 영향을 실시간으로 정량화하는 고도화된 진단 체계 구축"], "url": "https://directedproject.eu/"}, {"field": "기후영향평가·진단", "country": "중국", "title": "Spatio-temporal Coupling Evolution & Ecological Security Risks", "tag": "[2024-2027]", "org": "중국국가자연과학재단(NSFC)(주관)/ ICIMOD(국제통합산악개발센터) (참여)", "content": "시공간 결합 진화에 따른 생태 보안 리스크 평가", "goals": ["기후 변화 및 인류 활동에 따른 수자원·토양·생태계의 동역학적 변화를 분 <script>
// ---------- Country styling ----------
const COUNTRY_COLOR = {
  '미국':'#2e5c8a', 'EU':'#5d6fae', '중국':'#b23a32', '한국':'#0c1729',
  '덴마크':'#c0392b', '독일':'#3d3d3d', '일본':'#7a3050'
};
function countryColor(c){ return COUNTRY_COLOR[c] || '#6b6f7a'; }

// ---------- State ----------
let state = {
  view: 'overview', // overview | field
  field: DATA.fields[0],
  tab: 'rnd', // rnd | company | market
  country: 'ALL',
  query: ''
};

const TAB_DEFS = [
  {key:'rnd', label:'기술개발·실증현황', data:'rnd'},
  {key:'company', label:'주요기업·사업동향', data:'company'},
  {key:'market', label:'시장규모·주요변화', data:'market'},
];

function countFor(field, tabKey){
  return DATA[tabKey].filter(d => d.field === field).length;
}

// ---------- Render: ledger stats ----------
function renderLedger(){
  const el = document.getElementById('ledgerStrip');
  const countries = new Set(DATA.rnd.map(d=>d.country));
  const mitigation = Object.values(DATA.fieldCat).filter(c=>c.startsWith('감축')).length;
  const adaptation = Object.values(DATA.fieldCat).filter(c=>c.startsWith('적응')).length;
  const items = [
    [DATA.rnd.length, '기술개발·실증 사례'],
    [DATA.company.length, '기업 동향'],
    [DATA.market.length, '시장 데이터'],
    [`${mitigation}+${adaptation}`, '감축(01-15) · 적응(16-22)'],
    [countries.size, '대상 국가·지역'],
  ];
  el.innerHTML = items.map(([n,l]) => `
    <div class="ledger-item"><span class="ledger-num">${n}</span><span class="ledger-label">${l}</span></div>
  `).join('');
}

// ---------- Render: sidebar ----------
function renderSidebar(){
  const sb = document.getElementById('sidebar');
  let html = `<div class="overview-nav ${state.view==='overview'?'active':''}" id="overviewNav">
    <span class="ov-name">전체 통계</span>
    <span class="ov-icon">OVERVIEW</span>
  </div>`;
  for(const [cat, groupNames] of Object.entries(DATA.cats)){
    const fieldsInCat = groupNames.reduce((sum,g)=>sum+DATA.groups[g].length,0);
    html += `<div class="cat-block"><div class="cat-title">${cat}<span class="cat-count">${fieldsInCat}개 분야</span></div>`;
    for(const group of groupNames){
      const fields = DATA.groups[group];
      html += `<div class="group-block"><div class="group-title">${group}</div>`;
      for(const f of fields){
        const num = String(DATA.fieldNum[f]).padStart(2,'0');
        const active = (state.view==='field' && f === state.field) ? 'active' : '';
        const cnt = countFor(f, 'rnd');
        html += `<div class="field-row ${active}" data-field="${f}">
          <span class="field-num">${num}</span>
          <span class="field-name">${f}</span>
          <span class="field-count">${cnt}</span>
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }
  sb.innerHTML = html;
  document.getElementById('overviewNav').addEventListener('click', ()=>{
    state.view = 'overview';
    state.query = '';
    renderAll();
  });
  sb.querySelectorAll('.field-row').forEach(row=>{
    row.addEventListener('click', ()=>{
      state.view = 'field';
      state.field = row.dataset.field;
      state.country = 'ALL';
      state.query = '';
      syncMobileSelect();
      renderAll();
    });
  });
}

function buildMobileSelect(){
  const sel = document.getElementById('mobileSelect');
  let html = `<option value="__overview__">📊 전체 통계 (OVERVIEW)</option>`;
  for(const [cat, groupNames] of Object.entries(DATA.cats)){
    for(const group of groupNames){
      const fields = DATA.groups[group];
      html += `<optgroup label="${cat} — ${group}">`;
      for(const f of fields){
        const num = String(DATA.fieldNum[f]).padStart(2,'0');
        html += `<option value="${f}">${num} · ${f}</option>`;
      }
      html += `</optgroup>`;
    }
  }
  sel.innerHTML = html;
  sel.addEventListener('change', ()=>{
    if(sel.value === '__overview__'){
      state.view = 'overview';
    } else {
      state.view = 'field';
      state.field = sel.value;
      state.country = 'ALL';
    }
    renderAll();
  });
}
function syncMobileSelect(){
  document.getElementById('mobileSelect').value = state.view === 'overview' ? '__overview__' : state.field;
}

// ---------- Render: field header ----------
function renderFieldHeader(){
  document.getElementById('fieldGroupLabel').textContent =
    `FIELD ${String(DATA.fieldNum[state.field]).padStart(2,'0')} · ${DATA.fieldCat[state.field]} · ${DATA.fieldGroup[state.field]}`;
  document.getElementById('fieldTitle').textContent = state.field;

  const stats = TAB_DEFS.map(t => {
    const n = countFor(state.field, t.data);
    return `<div class="field-stat"><div class="n">${n}</div><div class="l">${t.label}</div></div>`;
  }).join('');
  document.getElementById('fieldStats').innerHTML = stats;
}

// ---------- Render: tabs ----------
function renderTabs(){
  const tb = document.getElementById('tabbar');
  tb.innerHTML = TAB_DEFS.map(t => {
    const n = countFor(state.field, t.data);
    const active = t.key === state.tab ? 'active' : '';
    return `<button class="tab-btn ${active}" data-tab="${t.key}">${t.label} (${n})</button>`;
  }).join('');
  tb.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.tab = btn.dataset.tab;
      state.country = 'ALL';
      renderAll();
    });
  });
}

// ---------- Filtering ----------
function currentRows(){
  const tabDef = TAB_DEFS.find(t=>t.key===state.tab);
  let rows = DATA[tabDef.data].filter(d => d.field === state.field);
  if(state.country !== 'ALL'){
    const key = tabDef.data === 'rnd' ? 'country' : 'scope';
    rows = rows.filter(d => d[key] === state.country);
  }
  if(state.query.trim()){
    const q = state.query.trim().toLowerCase();
    rows = rows.filter(d => JSON.stringify(d).toLowerCase().includes(q));
  }
  return rows;
}

function globalSearchRows(){
  const q = state.query.trim().toLowerCase();
  const out = {};
  TAB_DEFS.forEach(t=>{
    out[t.key] = DATA[t.data].filter(d => JSON.stringify(d).toLowerCase().includes(q));
  });
  return out;
}

// ---------- Render: filter chips ----------
function renderFilters(){
  const wrap = document.getElementById('filters');
  if(state.tab === 'rnd'){
    const countries = [...new Set(DATA.rnd.filter(d=>d.field===state.field).map(d=>d.country))];
    wrap.innerHTML = `<span class="ftag">국가</span>` +
      `<span class="chip ${state.country==='ALL'?'active':''}" data-c="ALL">전체</span>` +
      countries.map(c => `<span class="chip ${state.country===c?'active':''}" data-c="${c}">
        <span class="dot" style="background:${countryColor(c)}"></span>${c}
      </span>`).join('');
  } else {
    wrap.innerHTML = `<span class="ftag">구분</span>` +
      `<span class="chip ${state.country==='ALL'?'active':''}" data-c="ALL">전체</span>` +
      `<span class="chip ${state.country==='글로벌'?'active':''}" data-c="글로벌">글로벌</span>` +
      `<span class="chip ${state.country==='국내'?'active':''}" data-c="국내">국내</span>`;
  }
  wrap.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      state.country = chip.dataset.c;
      renderCards();
      renderFilters();
    });
  });
}

// ---------- Card renderers ----------

    ${d.org ? `<div class="card-org">${d.org}</div>` : ''}
    ${d.content ? `<div class="card-content">${d.content}</div>` : ''}
    ${d.goals.length ? `<ul class="card-goals">${d.goals.slice(0,5).map(g=>`<li>${g}</li>`).join('')}</ul>` : ''}
    <div class="card-foot">
      <span></span>

    <div class="card-title">${d.name}</div>
    ${d.strategy.length ? `<div class="kv-block"><div class="kv-label">신사업 전략</div>
      <ul class="card-goals">${d.strategy.slice(0,4).map(g=>`<li>${g}</li>`).join('')}</ul></div>` : ''}
    ${d.invest.length ? `<div class="kv-block"><div class="kv-label">투자·계약 현황</div>
      <ul class="card-goals">${d.invest.slice(0,4).map(g=>`<li>${g}</li>`).join('')}</ul></div>` : ''}
    <div class="card-foot">
      <span></span>
      ${d.url ? `<a class="card-link" href="${d.url}" target="_blank" rel="noopener">레퍼런스 ↗</a>` : ''}

function marketCard(d, idx){
  return `<div class="card" data-idx="${String(idx+1).padStart(3,'0')}">

      <span class="badge-scope">${d.scope}</span>

const CARD_RENDERERS = {rnd: rndCard, company: companyCard, market: marketCard};

// ---------- Render: cards ----------
function renderCards(){
  const wrap = document.getElementById('cards');
  const rows = currentRows();
  if(rows.length === 0){
    wrap.innerHTML = `<div class="empty-state" style="grid-column:1/-1">해당 조건의 데이터가 없습니다.</div>`;
    return;
  }
  const renderer = CARD_RENDERERS[state.tab];
  wrap.innerHTML = rows.map((d,i) => renderer(d,i)).join('');
}

// ---------- Overview: heatmap + coverage ----------
function lerpColor(c1, c2, t){
  return [0,1,2].map(i => Math.round(c1[i] + (c2[i]-c1[i]) * t));
}
const HEAT_STOPS = [
  [0.00, [252, 232, 178]],  // pale gold
  [0.30, [240, 189,  86]],  // warm amber
  [0.58, [214, 130,  40]],  // saturated orange-gold
  [0.80, [171,  68,  37]],  // burnt sienna
  [1.00, [ 90,  26,  30]],  // deep wine/ink
];
function heatColorAt(t){
  t = Math.min(1, Math.max(0, t));
  for(let i=0;i<HEAT_STOPS.length-1;i++){
    const [p0,c0]=HEAT_STOPS[i], [p1,c1]=HEAT_STOPS[i+1];
    if(t>=p0 && t<=p1){
      const local = p1>p0 ? (t-p0)/(p1-p0) : 0;
      return lerpColor(c0,c1,local);
    }
  }
  return HEAT_STOPS[HEAT_STOPS.length-1][1];
}
function heatStyle(value, max){
  if(!value) return 'background:transparent;color:var(--ink-faint);';
  const t = 0.16 + 0.84 * (value / max);
  const [r,g,b] = heatColorAt(t);
  const lum = 0.299*r + 0.587*g + 0.114*b;
  const color = lum < 150 ? '#fbf3e0' : '#2a2010';
  return `background:rgb(${r},${g},${b});color:${color};`;
}

function renderOverview(){
  const wrap = document.getElementById('overviewPanel');

  // column maxima (per data type, across 22 fields)
  const maxRnd = Math.max(...DATA.fields.map(f=>countFor(f,'rnd')));
  const maxCompany = Math.max(...DATA.fields.map(f=>countFor(f,'company')));
  const maxMarket = Math.max(...DATA.fields.map(f=>countFor(f,'market')));

  // heatmap rows grouped by cat/group
  let rowsHtml = '';
  for(const [cat, groupNames] of Object.entries(DATA.cats)){
    rowsHtml += `<tr class="cat-divider"><td colspan="5"><span class="heat-cat-label">${cat}</span></td></tr>`;
    for(const group of groupNames){
      rowsHtml += `<tr><td colspan="5"><span class="heat-group-label">${group}</span></td></tr>`;
      for(const f of DATA.groups[group]){
        const num = String(DATA.fieldNum[f]).padStart(2,'0');
        const r = countFor(f,'rnd'), c = countFor(f,'company'), m = countFor(f,'market');
        const total = r + c + m;
        rowsHtml += `<tr>
          <td><div class="heat-field-cell" data-field="${f}" data-tab="rnd">
            <span class="heat-field-num">${num}</span><span class="heat-field-name">${f}</span>
          </div></td>
          <td class="heat-cell ${r?'':'zero'}" data-field="${f}" data-tab="rnd" style="${heatStyle(r,maxRnd)}">${r||'–'}</td>
          <td class="heat-cell ${c?'':'zero'}" data-field="${f}" data-tab="company" style="${heatStyle(c,maxCompany)}">${c||'–'}</td>
          <td class="heat-cell ${m?'':'zero'}" data-field="${f}" data-tab="market" style="${heatStyle(m,maxMarket)}">${m||'–'}</td>
          <td class="heat-total-cell">${total}</td>
        </tr>`;
      }
    }
  }

  // country coverage (rnd entries only)
  const countryCounts = {};
  DATA.rnd.forEach(d=>{ countryCounts[d.country] = (countryCounts[d.country]||0)+1; });
  const sortedCountries = Object.entries(countryCounts).sort((a,b)=>b[1]-a[1]);
  const maxCountry = sortedCountries.length ? sortedCountries[0][1] : 1;
  const covHtml = sortedCountries.map(([c,n])=>`
    <div class="cov-row">
      <span class="cov-name">${c}</span>
      <span class="cov-bar-track"><span class="cov-bar-fill" style="width:${(n/maxCountry*100).toFixed(0)}%;background:${countryColor(c)}"></span></span>
      <span class="cov-n">${n}</span>
    </div>`).join('');

  // top 5 fields by total entries
  const totals = DATA.fields.map(f => ({
    f, total: countFor(f,'rnd')+countFor(f,'company')+countFor(f,'market')
  })).sort((a,b)=>b.total-a.total).slice(0,5);
  const topHtml = totals.map((t,i)=>`
    <div class="cov-row">
      <span class="cov-name" style="width:140px">${String(DATA.fieldNum[t.f]).padStart(2,'0')} · ${t.f}</span>
      <span class="cov-bar-track"><span class="cov-bar-fill" style="width:${(t.total/totals[0].total*100).toFixed(0)}%"></span></span>
      <span class="cov-n">${t.total}</span>
    </div>`).join('');

  wrap.innerHTML = `
    <div class="ov-hero">
      <div>
        <div class="eyebrow">DASHBOARD OVERVIEW</div>
        <h1>22개 기술분야 조사 통계</h1>
        <p>분야별로 조사된 기술개발·실증현황, 기업동향, 시장규모 데이터의 건수를 한눈에 확인합니다. 셀을 클릭하면 해당 분야·항목으로 바로 이동합니다.</p>
      </div>
      <div class="kpi-row">
        <div class="kpi-card"><div class="n">${DATA.rnd.length}</div><div class="l">기술개발·실증 사례</div></div>
        <div class="kpi-card"><div class="n">${DATA.company.length}</div><div class="l">기업 동향</div></div>
        <div class="kpi-card"><div class="n">${DATA.market.length}</div><div class="l">시장 데이터</div></div>
      </div>
    </div>

    <div class="ov-section">
      <div class="ov-section-head">
        <h2>분야별 조사 건수 히트맵</h2>
        <span class="ov-note">색이 진할수록 해당 항목의 조사 건수가 많음 (컬럼별 상대값)</span>
      </div>
      <table class="heat-table">
        <thead><tr>
          <th>기술분야</th>
          <th class="num">기술개발·실증</th>
          <th class="num">기업동향</th>
          <th class="num">시장규모</th>
          <th class="num">합계</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div class="heat-legend">
        <span>적음</span>
        <span class="sw" style="background:rgb(252,232,178)"></span>
        <span class="sw" style="background:rgb(240,189,86)"></span>
        <span class="sw" style="background:rgb(214,130,40)"></span>
        <span class="sw" style="background:rgb(171,68,37)"></span>
        <span class="sw" style="background:rgb(90,26,30)"></span>
        <span>많음</span>
      </div>
    </div>

    <div class="ov-section" style="display:grid;grid-template-columns:1fr 1fr;gap:40px;">
      <div>
        <div class="ov-section-head"><h2>국가·지역별 조사 건수</h2><span class="ov-note">실증현황 기준</span></div>
        ${covHtml}
      </div>
      <div>
        <div class="ov-section-head"><h2>조사 건수 상위 5개 분야</h2><span class="ov-note">3개 항목 합계 기준</span></div>
        ${topHtml}
      </div>
    </div>
  `;

  wrap.querySelectorAll('[data-field]').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.view = 'field';
      state.field = el.dataset.field;
      state.tab = el.dataset.tab || 'rnd';
      state.country = 'ALL';
      syncMobileSelect();
      renderAll();
    });
  });
}

function showPanel(which){
  document.getElementById('overviewPanel').style.display = which==='overview' ? 'block' : 'none';
  document.getElementById('fieldPanel').style.display = which==='overview' ? 'none' : 'block';
}

function renderAll(){
  renderSidebar();
  if(state.query.trim()){
    showPanel('field');
    renderGlobalSearchResults();
    return;
  }
  if(state.view === 'overview'){
    showPanel('overview');
    renderOverview();
  } else {
    showPanel('field');
    renderFieldHeader();
    renderTabs();
    renderFilters();
    renderCards();
  }
}

// ---------- Global search ----------
let searchTimer;
document.getElementById('globalSearch').addEventListener('input', (e)=>{
  clearTimeout(searchTimer);
  const val = e.target.value;
  searchTimer = setTimeout(()=>{
    state.query = val;
    renderAll();
  }, 180);
});

function renderGlobalSearchResults(){
  document.getElementById('fieldGroupLabel').textContent = `SEARCH RESULTS`;
  document.getElementById('fieldTitle').textContent = `"${state.query}" 검색 결과`;
  const results = globalSearchRows();
  document.getElementById('fieldStats').innerHTML = TAB_DEFS.map(t=>{
    return `<div class="field-stat"><div class="n">${results[t.key].length}</div><div class="l">${t.label}</div></div>`;
  }).join('');
  const tb = document.getElementById('tabbar');
  tb.innerHTML = TAB_DEFS.map(t=>{
    const active = t.key === state.tab ? 'active' : '';
    return `<button class="tab-btn ${active}" data-tab="${t.key}">${t.label} (${results[t.key].length})</button>`;
  }).join('');
  tb.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ state.tab = btn.dataset.tab; renderGlobalSearchResults(); });
  });
  document.getElementById('filters').innerHTML = `<span class="ftag">전체 기술분야 대상 검색 결과입니다</span>`;
  const wrap = document.getElementById('cards');
  const rows = results[state.tab];
  if(rows.length === 0){
    wrap.innerHTML = `<div class="empty-state" style="grid-column:1/-1">검색 결과가 없습니다.</div>`;
    return;
  }
  const renderer = CARD_RENDERERS[state.tab];
  wrap.innerHTML = rows.map((d,i)=>renderer(d,i)).join('');
}

// ---------- Init ----------
buildMobileSelect();
syncMobileSelect();
renderLedger();
renderAll();

</script>
